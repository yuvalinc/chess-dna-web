<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess DNA</title>
    <meta name="description" content="Chess DNA turns every chess game into progress. AI insights from your Chess.com or Lichess games: find your patterns, fix your weaknesses, replay your mistakes." />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Chess DNA",
      "url": "https://chessdna.app",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Web",
      "description": "AI-powered chess analysis that finds your patterns, fixes your weaknesses, and replays your mistakes from Chess.com and Lichess games.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does Chess DNA help me improve at chess?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chess DNA imports your Chess.com and Lichess games and uses AI to identify the specific patterns in your mistakes — like recurring tactical blindspots or common positional errors — so you can fix the exact weaknesses costing you rating points."
          }
        },
        {
          "@type": "Question",
          "name": "What is chess pattern recognition and why does it matter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chess pattern recognition is the ability to quickly identify recurring tactical and strategic motifs in a position. Players who recognize patterns faster make better moves with less calculation. Chess DNA surfaces the patterns from your own game history."
          }
        },
        {
          "@type": "Question",
          "name": "How is chess weakness analysis different from regular game review?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Regular game review shows you individual mistakes move by move. Chess weakness analysis aggregates hundreds of games to find systemic gaps — the categories of mistakes you repeat most — giving you a targeted training plan instead of a list of blunders."
          }
        }
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Chess DNA",
      "url": "https://chessdna.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://chessdna.app/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
