name: SEO Claude Code Executor (manual / fallback)

# Manual / fallback executor. The PRIMARY executor runs locally on the
# user's Mac (`npm run seo:execute`) because that's where Chrome MCP +
# the user's logged-in browser sessions live — needed for browser tasks
# like "submit sitemap to Google Search Console". Code-only tasks would
# work here too but we keep this disabled-by-default to avoid racing the
# local runner. Trigger this with:
#   gh workflow run seo-claude-code.yml -f issue=<n>

on:
  workflow_dispatch:
    inputs:
      issue:
        description: 'Specific issue number to execute (required)'
        required: true

permissions:
  contents: write
  issues: write

concurrency:
  group: seo-claude-code
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install chess-dna deps
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.email "claude-code-bot@users.noreply.github.com"
          git config user.name "Claude Code"

      - name: Execute approved SEO tasks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_ISSUE: ${{ inputs.issue }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/seo-execute.mjs

      - name: Push changes (if any)
        run: |
          if [ -n "$(git log origin/main..HEAD --oneline 2>/dev/null)" ]; then
            git push origin HEAD:main
          fi
