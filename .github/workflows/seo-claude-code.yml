name: SEO Claude Code Executor

# Polls GitHub Issues every 15 min for `seo-approved` (but not `seo-done`)
# and runs Claude Code (headless) on each unchecked task. Commits per task
# and pushes to main. The auto-provided GITHUB_TOKEN has issue + contents
# write access, so no extra secret is needed for the GH API.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      issue:
        description: 'Specific issue number to execute (skip the poll)'
        required: false

permissions:
  contents: write
  issues: write

concurrency:
  group: seo-claude-code
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install chess-dna deps
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.email "claude-code-bot@users.noreply.github.com"
          git config user.name "Claude Code"

      - name: Execute approved SEO tasks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_ISSUE: ${{ inputs.issue }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/seo-execute.mjs

      - name: Push changes (if any)
        run: |
          if [ -n "$(git log origin/main..HEAD --oneline 2>/dev/null)" ]; then
            git push origin HEAD:main
          fi
