          <h2>Chess DNA — AI Insights That Turn Every Game Into Progress</h2>
          <p><strong>Find your patterns. Fix your weaknesses. Get better.</strong> Chess DNA imports your <strong>Chess.com</strong> or <strong>Lichess</strong> games and turns them into a training plan built from how you actually play.</p>

          <h3>Find Patterns. Fix Weaknesses.</h3>
          <p>Chess DNA's AI detects your worst recurring patterns — <em>Missed Tactic, Missed Pin, Missed Fork, Missed Skewer, Missed Mate, Trapped Piece, Discovered Attack, Hanging Pieces, Back Rank Weakness, Endgame Technique, Opening Inaccuracy, King Safety, Time Pressure Blunder</em> and more — and tells you which ones are costing you the most rating.</p>

          <h3>Replay. Learn. Get Better.</h3>
          <p>Replay every mistake step-by-step. Chess DNA pulls the exact positions where you went wrong and lets you play them again until they stick. Hints, skips, and the engine's recommended move are all there.</p>

          <h3>Instant Game Analysis</h3>
          <p>Every game gets a clear explanation in plain English — the key moments, the mistakes, and the patterns you can act on. Not just centipawn numbers.</p>

          <h3>Your 8-Dimension Skill Radar</h3>
          <p>Track <em>Openings, Tactics, Defense, Positional, Endgame, Calculation, Time Management, and Resilience</em>. See your ELO percentile and rank tier, then share your Chess DNA card.</p>
